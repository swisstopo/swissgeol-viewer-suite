apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ui
  namespace: {{ .Release.Namespace }}
  annotations:
    keel.sh/policy: force
    keel.sh/match-tag: 'true'
    keel.sh/trigger: poll
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-ui
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-ui
    spec:
      containers:
      - name: {{ .Release.Name }}-ui
        image: {{ .Values.docker.ui_image }}
        imagePullPolicy: Always
        ports:
          - containerPort: 80

        resources:
          limits:
            cpu: '500m'
            memory: '1Gi'
          requests:
            cpu: 20m
            memory: 100Mi

      imagePullSecrets:
      - name: {{ .Release.Namespace }}-registry
      


