description:
  en:
    localisedName: swissgeol-Viewer
    shortDescription: 3D-Web-Viewer for geological data in Switzerland.
    longDescription: >-
      Use viewer.swissgeol.ch to explore geological data across Switzerland -
      both at the surface and deep underground. You can view existing datasets,
      combine different sources, and even integrate your own data for a tailored
      experience.

      With viewer.swissgeol.ch, you can...

      ...get an overview of geological data available across Switzerland

      ...combine surface and subsurface datasets

      ...slice through 3D geological models to explore underground structures

      ...upload and visualize your own geodata

      ...and much more
    documentation: https://www.swissgeol.ch/
